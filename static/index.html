<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Office Agent Staff</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="panel panel-left">
        <div class="brand">
          <p class="eyebrow">Korean Office Agent</p>
          <h1>Office Agent Staff</h1>
          <p class="lede">
            `rhwp` 기반 HWP 편집 엔진에 한국어 문서 작성 에이전트를 붙인 로컬 워크스테이션.
          </p>
        </div>

        <div class="card">
          <h2>문서</h2>
          <div class="button-row">
            <button id="new-document">빈 문서</button>
            <label class="file-button">
              파일 열기
              <input id="file-input" type="file" accept=".hwp,.hwpx" />
            </label>
            <button id="export-document" class="secondary">HWP 저장</button>
          </div>
          <div id="doc-meta" class="meta"></div>
        </div>

        <div class="card">
          <h2>문단 개요</h2>
          <div id="outline-box" class="meta outline-box">문서가 비어 있습니다.</div>
        </div>

        <div class="card">
          <h2>샘플 요청</h2>
          <div class="prompt-list">
            <button class="prompt-chip" data-prompt="팀 주간업무보고 초안을 제목, 요약, 진행현황 표, 다음주 계획으로 작성해줘.">
              주간업무보고
            </button>
            <button class="prompt-chip" data-prompt="회의록 형태로 정리하고 결정사항과 액션아이템을 표로 넣어줘.">
              회의록 정리
            </button>
            <button class="prompt-chip" data-prompt="현재 문서를 더 격식 있는 공문체로 다듬어줘.">
              공문체 다듬기
            </button>
          </div>
        </div>

        <div class="card">
          <h2>상태</h2>
          <pre id="status-box">초기화 중...</pre>
        </div>
      </aside>

      <main class="workspace">
        <div class="workspace-head">
          <div>
            <p class="eyebrow">Preview</p>
            <h2>오피스 워크스테이션</h2>
          </div>
          <span id="render-badge" class="badge">대기</span>
        </div>
        <div class="mode-tabs">
          <button id="tab-writer" class="mode-tab active">Writer</button>
          <button id="tab-notes" class="mode-tab">Notes</button>
          <button id="tab-sheet" class="mode-tab">Sheet</button>
          <button id="tab-slides" class="mode-tab">Slides</button>
        </div>

        <section id="workspace-writer" class="workspace-panel active">
          <div id="pages" class="pages"></div>
        </section>

        <section id="workspace-notes" class="workspace-panel">
          <div class="tool-head">
            <h3>메모장</h3>
            <div class="button-row">
              <button id="new-note" class="secondary">새 메모</button>
              <button id="export-note">TXT 저장</button>
            </div>
          </div>
          <textarea id="notes-pad" class="tool-textarea" placeholder="빠른 메모, 회의 초안, 체크리스트를 적어두는 공간입니다."></textarea>
        </section>

        <section id="workspace-sheet" class="workspace-panel">
          <div class="tool-head">
            <h3>시트</h3>
            <div class="button-row">
              <button id="reset-sheet" class="secondary">시트 초기화</button>
              <button id="export-sheet">CSV 저장</button>
            </div>
          </div>
          <div id="sheet-grid" class="sheet-grid"></div>
        </section>

        <section id="workspace-slides" class="workspace-panel">
          <div class="tool-head">
            <h3>슬라이드 초안</h3>
            <div class="button-row">
              <button id="generate-slides" class="secondary">현재 요청으로 생성</button>
              <button id="export-slides">MD 저장</button>
            </div>
          </div>
          <div id="slides-deck" class="slides-deck"></div>
        </section>
      </main>

      <aside class="panel panel-right">
        <div class="card chat-card">
          <h2>에이전트</h2>
          <div id="mode-hint" class="reply planner-meta">현재 대상: Writer</div>
          <textarea
            id="prompt-input"
            placeholder="예: 인사평가 회의 결과를 공문 초안으로 정리하고 표로 핵심 일정도 넣어줘."
          ></textarea>
          <div class="button-row">
            <button id="run-agent">작업 실행</button>
          </div>
          <div id="agent-reply" class="reply"></div>
        </div>

        <div class="card">
          <h2>편집 계획</h2>
          <pre id="plan-box">아직 실행된 계획이 없습니다.</pre>
          <div id="planner-meta" class="reply planner-meta">플래너 정보 없음</div>
        </div>
      </aside>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
