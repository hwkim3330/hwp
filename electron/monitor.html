<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>System Monitor</title>
    <style>
      :root {
        --bg-top: #fff6ea;
        --bg-bottom: #ead8c3;
        --ink: #1f1a17;
        --muted: #6d6358;
        --card: rgba(255, 255, 255, 0.72);
        --line: rgba(69, 50, 31, 0.12);
        --accent: #c96f3b;
        --accent-soft: rgba(201, 111, 59, 0.2);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "SF Pro Display", "Apple SD Gothic Neo", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.7), transparent 34%),
          linear-gradient(145deg, var(--bg-top), var(--bg-bottom));
        color: var(--ink);
      }

      .shell {
        padding: 18px;
      }

      .hero {
        display: grid;
        grid-template-columns: 96px 1fr;
        gap: 14px;
        align-items: center;
        margin-bottom: 14px;
        padding: 14px;
        border-radius: 22px;
        background: linear-gradient(160deg, rgba(255, 255, 255, 0.76), rgba(255, 245, 232, 0.62));
        border: 1px solid var(--line);
        box-shadow: 0 16px 30px rgba(84, 59, 36, 0.12);
      }

      .mascot {
        width: 96px;
        height: 96px;
        border-radius: 28px;
        display: grid;
        place-items: center;
        font-size: 54px;
        background:
          radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.95), rgba(255, 233, 211, 0.55)),
          linear-gradient(160deg, rgba(255, 255, 255, 0.86), rgba(233, 210, 187, 0.55));
        border: 1px solid rgba(91, 67, 43, 0.12);
        position: relative;
        overflow: hidden;
      }

      .mascot::after {
        content: "";
        position: absolute;
        inset: auto -8px -26px auto;
        width: 66px;
        height: 66px;
        border-radius: 999px;
        background: var(--accent-soft);
        filter: blur(8px);
      }

      .hero-copy h1 {
        margin: 0;
        font-size: 17px;
        letter-spacing: 0.02em;
      }

      .hero-copy p {
        margin: 6px 0 0;
      }

      .mood-line {
        font-size: 14px;
        color: var(--muted);
      }

      .status-line {
        font-size: 28px;
        font-weight: 760;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 12px 14px;
        backdrop-filter: blur(10px);
      }

      .card.wide {
        grid-column: 1 / -1;
      }

      .label {
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .value {
        margin-top: 6px;
        font-size: 28px;
        font-weight: 760;
      }

      .meta {
        margin-top: 8px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .meter {
        margin-top: 10px;
        height: 10px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(89, 66, 42, 0.09);
      }

      .meter-bar {
        height: 100%;
        width: 0%;
        border-radius: inherit;
        background: linear-gradient(90deg, #d9804a, #bf4f36);
        transition: width 180ms ease;
      }

      .footer-note {
        margin-top: 12px;
        font-size: 11px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="hero">
        <div id="mascot" class="mascot">🙂</div>
        <div class="hero-copy">
          <h1>Office Agent Monitor</h1>
          <p id="mood-line" class="mood-line">steady</p>
          <p id="status-line" class="status-line">리소스 안정적</p>
        </div>
      </section>

      <section class="grid">
        <article class="card">
          <div class="label">CPU</div>
          <div id="cpu" class="value">--%</div>
          <div class="meter"><div id="cpu-bar" class="meter-bar"></div></div>
        </article>
        <article class="card">
          <div class="label">Memory</div>
          <div id="mem" class="value">--%</div>
          <div class="meter"><div id="mem-bar" class="meter-bar"></div></div>
        </article>
        <article class="card">
          <div class="label">Battery</div>
          <div id="batt" class="value">--</div>
          <div id="batt-meta" class="meta">배터리 정보 로딩 중</div>
        </article>
        <article class="card">
          <div class="label">Neural</div>
          <div id="npu" class="value">--</div>
          <div class="meta">현재 Electron 스택에선 ANE 실시간 측정이 어렵습니다.</div>
        </article>
        <article class="card wide">
          <div class="label">GPU</div>
          <div id="gpu" class="value">--</div>
          <div id="gpu-meta" class="meta">GPU 모델 정보 로딩 중</div>
        </article>
      </section>

      <div class="footer-note">Claude풍 상태 캐릭터와 리소스 패널. 메뉴바에서는 간단한 이모지 상태만 유지합니다.</div>
    </div>

    <script>
      const mascot = document.getElementById("mascot");
      const moodLine = document.getElementById("mood-line");
      const statusLine = document.getElementById("status-line");
      const cpu = document.getElementById("cpu");
      const mem = document.getElementById("mem");
      const batt = document.getElementById("batt");
      const battMeta = document.getElementById("batt-meta");
      const gpu = document.getElementById("gpu");
      const gpuMeta = document.getElementById("gpu-meta");
      const npu = document.getElementById("npu");
      const cpuBar = document.getElementById("cpu-bar");
      const memBar = document.getElementById("mem-bar");

      function messageForMood(mood, stats) {
        if (mood.label === "critical") {
          return `시스템이 뜨겁습니다. CPU ${stats.cpu}% / MEM ${stats.mem}%`;
        }
        if (mood.label === "busy") {
          return `작업량이 높습니다. 잠깐 숨 고르기 필요`;
        }
        if (mood.label === "active") {
          return `집중 작업 중입니다. 아직 안정권`;
        }
        if (mood.label === "steady") {
          return `리소스 안정적`;
        }
        return `지금은 한가합니다`;
      }

      window.desktopMonitor.onStats((stats) => {
        const mood = stats.mood || { emoji: "🙂", label: "steady", face: "o_o" };
        mascot.textContent = mood.emoji;
        moodLine.textContent = `${mood.label} · ${mood.face}`;
        statusLine.textContent = messageForMood(mood, stats);
        cpu.textContent = `${stats.cpu}%`;
        mem.textContent = `${stats.mem}%`;
        batt.textContent = stats.batt === null ? "AC" : `${stats.batt}%`;
        battMeta.textContent = stats.batt === null ? "전원 어댑터 연결 상태" : "배터리 잔량";
        gpu.textContent = stats.gpuLoad === null ? stats.gpuLabel : `${stats.gpuLoad}%`;
        gpuMeta.textContent = stats.gpuLoad === null
          ? `${stats.gpuLabel} 감지됨. 실시간 GPU 퍼센트는 현재 빌드에서 미지원`
          : stats.gpuLabel;
        npu.textContent = stats.npuLabel;
        cpuBar.style.width = `${Math.max(0, Math.min(100, stats.cpu))}%`;
        memBar.style.width = `${Math.max(0, Math.min(100, stats.mem))}%`;
      });
    </script>
  </body>
</html>
