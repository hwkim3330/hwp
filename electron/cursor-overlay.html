<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cursor Overlay</title>
    <style>
      html, body, canvas {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }

      body {
        cursor: none;
      }

      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="overlay"></canvas>
    <script>
      const canvas = document.getElementById("overlay");
      const ctx = canvas.getContext("2d");
      let width = 0;
      let height = 0;
      let cursor = { x: window.innerWidth / 2, y: window.innerHeight / 2 };

      function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      }

      function draw() {
        ctx.clearRect(0, 0, width, height);

        const outerRadius = 36;
        const innerRadius = 10;

        ctx.beginPath();
        ctx.arc(cursor.x, cursor.y, outerRadius, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(255, 188, 82, 0.92)";
        ctx.lineWidth = 5;
        ctx.shadowColor = "rgba(255, 188, 82, 0.45)";
        ctx.shadowBlur = 16;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(cursor.x, cursor.y, innerRadius, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255, 251, 239, 0.96)";
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.strokeStyle = "rgba(255, 220, 153, 0.65)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(cursor.x - 64, cursor.y);
        ctx.lineTo(cursor.x + 64, cursor.y);
        ctx.moveTo(cursor.x, cursor.y - 64);
        ctx.lineTo(cursor.x, cursor.y + 64);
        ctx.stroke();
      }

      function animate() {
        draw();
        requestAnimationFrame(animate);
      }

      window.desktopMonitor.onCursorOverlayTick((payload) => {
        if (payload?.cursor) {
          cursor = payload.cursor;
        }
      });

      resize();
      window.addEventListener("resize", resize);
      animate();
    </script>
  </body>
</html>
